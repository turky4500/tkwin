<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسل واتساب السحابي | تكوين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... (نفس الستايل السابق بدون تغيير) ... */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Tahoma','Arial',sans-serif; }
        body { background: linear-gradient(145deg, #0b2b40 0%, #1e4e62 100%); min-height:100vh; padding:25px 15px; display:flex; justify-content:center; align-items:center; }
        .container { max-width:1200px; width:100%; margin:0 auto; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.25); border-radius:40px; padding:30px 25px; box-shadow:0 30px 50px rgba(0,0,0,0.2); }
        h1 { color:#fff; text-align:center; margin-bottom:25px; font-size:2.8rem; text-shadow:0 5px 20px #00e5ff; }
        .tabs { display:flex; gap:15px; margin-bottom:25px; justify-content:center; }
        .tab-btn { background:transparent; border:2px solid #2dd4bf; color:#fff; padding:12px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; }
        .tab-btn.active { background:#2dd4bf; color:#022c3a; font-weight:bold; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .grid-2col { display:grid; grid-template-columns:1.2fr 0.9fr; gap:25px; margin-bottom:30px; }
        @media (max-width:800px){ .grid-2col{grid-template-columns:1fr;} }
        .input-area { background:rgba(8,40,55,0.7); border-radius:30px; padding:22px 20px; border:1px solid #2dd4bf60; }
        label { color:#c2f0ff; margin-bottom:12px; font-weight:600; font-size:1.2rem; display:block; }
        textarea, input[type="text"], input[type="password"], input[type="time"] {
            width:100%; padding:16px 18px; background:#06202b; border:2px solid #1e6a7a; border-radius:24px; color:#fff; font-size:1rem;
        }
        .filter-btn { background:linear-gradient(135deg,#00b4d8,#48cae4); border:none; color:#022c3a; padding:14px 24px; font-size:1.3rem; border-radius:50px; margin:18px 0 10px; cursor:pointer; width:100%; }
        .send-btn { background:#25d366; color:#01181f; font-size:1.8rem; padding:20px 40px; border:none; border-radius:60px; width:100%; max-width:450px; margin:10px auto; box-shadow:0 0 30px #25d366; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:15px; }
        .checkbox-group { display:flex; align-items:center; gap:10px; margin:15px 0; }
        .checkbox-group input { width:auto; margin:0; }
        .time-inputs { display:flex; gap:10px; align-items:center; }
        .time-inputs input { flex:1; }
        .footer-note { color:#b3e4ff; text-align:center; margin-top:25px; }
        .progress-panel { background:#0e2a36e0; border-radius:30px; padding:25px; margin-top:30px; border:1px solid #facc15; }
        .status-header { display:flex; justify-content:space-between; color:#fde68a; font-size:1.3rem; margin-bottom:15px; }
        .progress-bar-container { height:22px; background:#1e3a4b; border-radius:40px; margin:15px 0; overflow:hidden; }
        .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#2dd4bf,#facc15); border-radius:40px; }
        .countdown-timer { background:#1e4a5f; border-radius:50px; padding:10px 25px; margin:15px 0; text-align:center; display:inline-block; border:1px solid #facc15; color:#fde68a; font-size:1.8rem; font-family:monospace; }
        .edit-time-btn { background:#facc15; border:none; padding:5px 15px; border-radius:20px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h1><i class="fab fa-whatsapp"></i> مرسل واتساب السحابي <i class="fas fa-clock"></i></h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="new">🚀 حملة جديدة</button>
            <button class="tab-btn" data-tab="track">🔍 متابعة حملة</button>
        </div>

        <!-- تبويب حملة جديدة -->
        <div id="tab-new" class="tab-content active">
            <!-- ... (نفس المحتوى السابق بدون تغيير) ... -->
        </div>

        <!-- تبويب متابعة حملة -->
        <div id="tab-track" class="tab-content">
            <!-- ... (نفس المحتوى السابق بدون تغيير) ... -->
        </div>

        <!-- تذييل الصفحة الجديد -->
        <div class="footer-note" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <i class="fas fa-link" style="color: #2dd4bf;"></i>
                <span style="color: #e6f7ff;">هذه المنصة جزء من خدمات</span>
                <a href="https://tkwin.com.sa" target="_blank" style="color: #facc15; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #facc15;">
                    <i class="fas fa-globe"></i> موقع تكوين
                </a>
                <span style="color: #e6f7ff;">| إرسال رسائل واتساب بكميات كبيرة بسهولة وأمان</span>
            </div>
            <div style="color: #b3e4ff; font-size: 0.9rem;">
                <i class="far fa-clock"></i> يعمل على السحابة 24/7
            </div>
        </div>
    </div>
</div>
<script>
    // ... (نفس كود JavaScript السابق بدون تغيير) ...
</script>
</body>
</html>
